name: ASCII Artwork workflow
on: push
jobs:
    build_job_1:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: list repo files
              run: ls -ltra
            - name: cowsay artwork
              run: | 
                  sudo apt-get install cowsay -y
                  cowsay -f dragon >> dragon.txt
    test_job_2:
        runs-on: ubuntu-latest
        steps:
            - name: test phase
            # - name: Execute shell script
            #   run: |
            #     chmod +x ascii_script.sh
            #     ./ascii_script.sh
            
            # - name: list files
            #   run: ls -a
              run: cat dragon.txt

    deploy_job_3:
        runs-on: ubuntu-latest
        steps:
            - name: deploy stage
              run: grep -i dragon.txt
