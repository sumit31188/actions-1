name: ASCII Artwork workflow
on: push
jobs:
    build_job_1:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: list repo files
              run: ls -ltra
            - name: cowsay artwork
              run: | 
                  sudo apt-get install cowsay -y
                  cowsay -f dragon "Hey There!!!!  I am a DRAGON" >> dragon.txt

            - name: upload dragon.txt file to artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: my-artifact
                  path: dragon.txt
    test_job_2:
        needs: build_job_1
        runs-on: ubuntu-latest
        steps:
          - name: download dragon.txt file to artifacts
            uses: actions/download-artifact@v8
            with:
                  name: my-artifact
          - name: test phase
            # - name: Execute shell script
            #   run: |
            #     chmod +x ascii_script.sh
            #     ./ascii_script.sh
            
            # - name: list files
            #   run: ls -a
            run: cat dragon.txt

    deploy_job_3:
        needs: test_job_2
        runs-on: ubuntu-latest
        steps:
          - name: download dragon.txt file to artifacts
            uses: actions/download-artifact@v8
            with:
                name: my-artifact
          - name: deploy stage
            run: grep -i "dragon" dragon.txt
